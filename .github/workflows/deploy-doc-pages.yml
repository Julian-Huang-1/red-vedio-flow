name: Deploy docs site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - apps/doc/**
      - .github/workflows/deploy-doc-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          package-manager-cache: false

      - name: Validate static site with Node.js 22
        run: >-
          node -e "const fs=require('node:fs');const html=fs.readFileSync('apps/doc/index.html','utf8');if(!html.startsWith('<!doctype html>')||!html.includes('data:image/webp;base64,'))process.exit(1);console.log(process.version,'static site ok')"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
